<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تحديث تطبيق التوافقات</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-gold: #ffb100;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* خلفية متحركة خفيفة */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 177, 0, 0.05) 0%, transparent 70%);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding: 20px;
        }

        .app-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--accent-gold), #e69e00);
            border-radius: 25px;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            box-shadow: 0 10px 30px rgba(255, 177, 0, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--accent-gold);
        }

        .version-badge {
            background: rgba(255, 177, 0, 0.1);
            color: var(--accent-gold);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid var(--accent-gold);
            display: inline-block;
            margin-bottom: 20px;
        }

        .download-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .feature-list {
            text-align: right;
            margin: 20px 0 30px;
            padding: 0;
            list-style: none;
        }

        .feature-list li {
            margin-bottom: 12px;
            color: var(--text-dim);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }

        .feature-list li::before {
            content: "✓";
            color: var(--accent-gold);
            margin-left: 10px;
            font-weight: bold;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--accent-gold), #cc8e00);
            color: #0f172a;
            text-decoration: none;
            display: block;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.2rem;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(255, 177, 0, 0.2);
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 177, 0, 0.4);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* لقطة شاشة وهمية لمظهر التطبيق */
        .preview {
            margin-top: 30px;
            opacity: 0.5;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="app-logo">📱</div>
        
        <h1>تطبيق التوافقات</h1>
        <div class="version-badge">الإصدار الأحدث V2.0</div>

        <div class="download-card">
            <p style="color: var(--text-main); font-weight: 600;">تحديث جديد متوفر الآن!</p>
            
            <ul class="feature-list">
                <li>إضافة موديلات iPhone 16 الجديدة.</li>
                <li>تحديث توافقات لزقات الشاشة (HD).</li>
                <li>تحسين سرعة البحث بشكل كبير.</li>
                <li>إضافة نظام الإشعارات الذكي.</li>
            </ul>

            <a href="https://raw.githubusercontent.com/FirassAldalate/Black-List/main/app.html" download="التوافقات_الجديد.html" class="btn-main">
                تنزيل الملف الآن
            </a>
        </div>

        <div class="preview">
            تصميم آمن وسريع عبر GitHub
        </div>

        <div class="footer-text">
            جميع الحقوق محفوظة &copy; 2026
        </div>
    </div>

</body>
</html>
