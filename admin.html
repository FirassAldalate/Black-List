<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة التحكم - القائمة السوداء</title>
    <style>
        /* --- الهوية البصرية الموحدة --- */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-gold: #ffb100;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 177, 0, 0.02) 0%, transparent 70%);
            z-index: -1;
        }

        /* شاشة تسجيل الدخول */
        #login-screen {
            text-align: center;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 30px;
            max-width: 380px;
            width: 90%;
            margin-top: 80px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #login-screen h3 { color: var(--accent-gold); margin-bottom: 25px; font-size: 22px; }

        input[type="password"] {
            width: 100%; padding: 15px; margin-bottom: 20px;
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.5); color: white;
            text-align: center; font-size: 20px; box-sizing: border-box; outline: none;
        }

        .btn-login {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--accent-gold), #cc8e00);
            color: #0f172a; border-radius: 15px; border: none;
            font-weight: 800; font-size: 18px; cursor: pointer;
        }

        /* محتوى المدير والبطاقات */
        #admin-content { width: 100%; max-width: 500px; display: none; }
        .admin-title { text-align: center; color: var(--accent-gold); margin: 20px 0; font-weight: 900; }

        .card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-right: 6px solid var(--accent-gold);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .info-row { margin-bottom: 12px; }
        .info-row label { display: block; font-size: 11px; color: var(--accent-gold); font-weight: bold; margin-bottom: 5px; padding-right: 5px; }
        .info-row input {
            width: 100%; padding: 10px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px; color: #fff;
            box-sizing: border-box; font-size: 14px; outline: none;
        }

        .actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: white; transition: 0.2s; }
        .btn-ok { background: var(--success); box-shadow: 0 4px 15px rgba(39, 174, 96, 0.2); }
        .btn-no { background: var(--danger); box-shadow: 0 4px 15px rgba(231, 76, 60, 0.2); }
        .btn:active { transform: scale(0.95); opacity: 0.8; }

        #msg { text-align: center; color: var(--text-dim); padding: 30px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="login-screen">
        <h3>🔐 دخول الإدارة</h3>
        <input type="password" id="passInput" placeholder="كلمة السر">
        <button class="btn-login" onclick="checkLogin()">دخول النظام</button>
    </div>

    <div id="admin-content">
        <h2 class="admin-title">البلاغات المعلقة</h2>
        <div id="list">
            <p id="msg">🔄 جاري جلب البيانات من السحابة...</p>
        </div>
    </div>

<script>
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbyS8x7lZ40mEzbgP3tOw56ZxHnCd2XUk2dC7vdbma4J8zVDlkUkrSgivf3HApBowocjSg/exec';
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSF5W0EW-E_36UGUSpTWJkXx7gaLqjUbyz90syivKGp9D4GFWIm_yQmQxaNo_2lUmN1pM0BjH4bQPnI/pub?gid=341654715&single=true&output=csv';

    function checkLogin() {
        if(document.getElementById('passInput').value === '123789') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadData();
        } else { 
            alert("⚠️ كلمة السر خاطئة!"); 
        }
    }

    function parseCSV(text) {
        const rows = [];
        const lines = text.split(/\r?\n/);
        for (let line of lines) {
            if (line.trim() === "") continue;
            const parts = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            if (parts) {
                rows.push(parts.map(p => p.replace(/^"|"$/g, '').trim()));
            }
        }
        return rows;
    }

    async function loadData() {
        const list = document.getElementById('list');
        try {
            const response = await fetch(csvUrl + "&v=" + new Date().getTime());
            const text = await response.text();
            const rows = parseCSV(text);

            if (rows.length <= 1) {
                list.innerHTML = "<p id='msg'>✅ لا توجد طلبات جديدة حالياً</p>";
                return;
            }

            list.innerHTML = "";
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="info-row"><label>الشركة</label><input type="text" id="br-${i+1}" value="${r[1] || ''}"></div>
                    <div class="info-row"><label>الموديل</label><input type="text" id="mo-${i+1}" value="${r[2] || ''}"></div>
                    <div class="info-row"><label>اللون</label><input type="text" id="cl-${i+1}" value="${r[3] || ''}"></div>
                    <div class="info-row"><label>IMEI</label><input type="text" id="im-${i+1}" value="${r[4] || ''}"></div>
                    <div class="info-row"><label>السيريال</label><input type="text" id="sn-${i+1}" value="${r[5] || ''}"></div>
                    <div class="info-row"><label>الهاتف</label><input type="text" id="ph-${i+1}" value="${r[6] || ''}"></div>
                    <div class="actions">
                        <button class="btn btn-ok" onclick="handle(${i+1}, 'approve', this)">نشر الآن ✅</button>
                        <button class="btn btn-no" onclick="handle(${i+1}, 'delete', this)">حذف البلاغ 🗑️</button>
                    </div>`;
                list.appendChild(card);
            }
        } catch (e) {
            list.innerHTML = "<p id='msg'>❌ فشل الاتصال بخادم جوجل</p>";
        }
    }

    async function handle(row, type, btn) {
        const card = btn.closest('.card');
        const originalText = btn.innerText;
        btn.innerText = "...";
        btn.disabled = true;
        card.style.opacity = "0.4";

        let url = `${scriptUrl}?row=${row}&action=${type === 'approve' ? 'approve_with_edit' : 'delete_pending'}`;
        if (type === 'approve') {
            url += `&brand=${encodeURIComponent(document.getElementById('br-'+row).value)}` +
                   `&model=${encodeURIComponent(document.getElementById('mo-'+row).value)}` +
                   `&color=${encodeURIComponent(document.getElementById('cl-'+row).value)}` +
                   `&imei=${encodeURIComponent(document.getElementById('im-'+row).value)}` +
                   `&serial=${encodeURIComponent(document.getElementById('sn-'+row).value)}` +
                   `&owner=${encodeURIComponent(document.getElementById('ph-'+row).value)}`;
        }

        try {
            await fetch(url, { mode: 'no-cors' });
            card.style.transform = "scale(0.8)";
            card.style.opacity = "0";
            setTimeout(() => { 
                card.remove(); 
                if(document.querySelectorAll('.card').length === 0) loadData(); 
            }, 500);
        } catch (err) {
            alert("حدث خطأ أثناء التنفيذ");
            btn.innerText = originalText;
            btn.disabled = false;
            card.style.opacity = "1";
        }
    }
</script>
</body>
</html>
