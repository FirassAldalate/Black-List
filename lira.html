<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أسعار الصرف - الليرة اليوم (مباشر)</title>
    <style>
        :root { 
            --bg-color: #0f172a; --card-bg: #1e293b;       
            --accent-gold: #ffb100; --text-main: #f8fafc;     
            --text-dim: #94a3b8; --success: #25d366;
            --error: #ef4444;
        }

        /* منع الخروج عن الإطار */
        html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; background-color: var(--bg-color); }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: var(--text-main); direction: rtl; 
            padding: 15px; box-sizing: border-box;
            padding-bottom: 120px;
        }

        .container { width: 100%; max-width: 480px; margin: 0 auto; }

        header { 
            text-align: center; padding: 30px 0; 
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px; margin-bottom: 25px;
            border: 1px solid rgba(255, 177, 0, 0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
        }
        header h1 { color: var(--accent-gold); margin: 0; font-size: 1.5rem; }
        header p { color: var(--text-dim); font-size: 0.9rem; margin-top: 5px; }

        /* حالة الاتصال */
        #status-light {
            position: absolute; top: 15px; left: 15px;
            width: 10px; height: 10px; border-radius: 50%;
            background-color: gray; /* رمادي مبدئياً */
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        #status-light.online { background-color: var(--success); box-shadow: 0 0 10px var(--success); }
        #status-light.error { background-color: var(--error); box-shadow: 0 0 10px var(--error); }

        /* كروت العملات */
        .price-card {
            background: var(--card-bg); border-radius: 20px;
            padding: 20px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between;
            border-right: 5px solid var(--accent-gold);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            position: relative;
        }
        
        .currency-info { display: flex; align-items: center; gap: 15px; }
        .currency-flag { font-size: 2rem; }
        .currency-name { font-weight: bold; font-size: 1.1rem; }
        .currency-sub { color: var(--text-dim); font-size: 0.8rem; display: block; }

        .price-values { text-align: left; }
        .buy-price { color: var(--success); font-weight: 800; font-size: 1.3rem; display: block; }
        .sell-price { color: var(--error); font-weight: 800; font-size: 1.3rem; display: block; }
        .label { font-size: 0.7rem; color: var(--text-dim); margin-left: 5px; }

        /* مؤشر التحميل */
        .loading-shimmer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            display: block; /* يختفي عند تحميل البيانات */
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* محول العملات السريع */
        .converter {
            background: rgba(30, 41, 59, 0.5); border-radius: 20px;
            padding: 20px; border: 1px dashed rgba(255, 177, 0, 0.3);
            margin-top: 20px;
        }
        .converter h3 { color: var(--accent-gold); font-size: 1rem; margin-top: 0; text-align: center; }
        .input-group { position: relative; margin-top: 15px; }
        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #334155;
            background: #0f172a; color: var(--accent-gold); font-size: 1.2rem;
            text-align: center; outline: none; box-sizing: border-box;
        }
        .result-box { 
            margin-top: 15px; text-align: center; font-weight: bold; 
            font-size: 1.4rem; color: var(--text-main); 
        }

        /* التنبيه والإعلان */
        #copy-toast {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: var(--accent-gold); color: #000; padding: 10px 25px;
            border-radius: 50px; font-weight: bold; display: none; z-index: 1000;
        }
        #smart-ad-box {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 90px;
            background: #0f172a; border-top: 2px solid var(--accent-gold); display: none;
        }
        #smart-ad-img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div id="status-light"></div>
        <h1>أسعار صرف الليرة السورية</h1>
        <p id="last-update">جاري جلب البيانات...</p>
    </header>

    <div class="price-card" id="usd-card">
        <div class="loading-shimmer" id="usd-shimmer"></div>
        <div class="currency-info">
            <span class="currency-flag">🇺🇸</span>
            <div>
                <span class="currency-name">الدولار الأمريكي</span>
                <span class="currency-sub">USD / SYP</span>
            </div>
        </div>
        <div class="price-values">
            <span class="buy-price"><span class="label">شراء</span><span id="usd-buy">----</span></span>
            <span class="sell-price"><span class="label">مبيع</span><span id="usd-sell">----</span></span>
        </div>
    </div>

    <div class="price-card" id="eur-card">
        <div class="loading-shimmer" id="eur-shimmer"></div>
        <div class="currency-info">
            <span class="currency-flag">🇪🇺</span>
            <div>
                <span class="currency-name">اليورو الأوروبي</span>
                <span class="currency-sub">EUR / SYP</span>
            </div>
        </div>
        <div class="price-values">
            <span class="buy-price"><span class="label">شراء</span><span id="eur-buy">----</span></span>
            <span class="sell-price"><span class="label">مبيع</span><span id="eur-sell">----</span></span>
        </div>
    </div>

    <div class="converter">
        <h3>حاسبة الصرف السريع (بالدولار المبيع)</h3>
        <input type="number" id="amount" placeholder="أدخل المبلغ بالدولار" oninput="convert()">
        <div class="result-box" id="result">0 ليرة سورية</div>
    </div>
</div>

<div id="copy-toast">تم نسخ الرقم ✅</div>
<div id="smart-ad-box"><img id="smart-ad-img" src=""></div>

<script>
    // --- متغيرات عالمية لحفظ السعر المباشر ---
    let currentUsdSell = 0;

    // وظيفة التحويل
    function convert() {
        const amt = document.getElementById('amount').value;
        const res = document.getElementById('result');
        if (amt > 0 && currentUsdSell > 0) {
            const total = amt * currentUsdSell;
            res.innerText = total.toLocaleString() + " ليرة سورية";
        } else {
            res.innerText = "0 ليرة سورية";
        }
    }

    // --- جلب البيانات المباشرة من موقع الليرة اليوم (Offline-Ready Proxy) ---
    async function fetchLivePrices() {
        const updateText = document.getElementById('last-update');
        const statusLight = document.getElementById('status-light');
        const usdBuy = document.getElementById('usd-buy');
        const usdSell = document.getElementById('usd-sell');
        const eurBuy = document.getElementById('eur-buy');
        const eurSell = document.getElementById('eur-sell');
        const usdShimmer = document.getElementById('usd-shimmer');
        const eurShimmer = document.getElementById('eur-shimmer');

        try {
            // نستخدم خدمة API كـ Proxy لتخطي مشاكل CORS عند الاتصال المباشر من المتصفح
            // هذا الرابط يجلب البيانات الحية من موقع sp-today.com
            const response = await fetch('https://api.allorigins.win/raw?url=https://sp-today.com/api/get_gold_and_silver_prices?city_id=1');
            const data = await response.json();

            // تحليل واستخراج الأسعار
            // ملاحظة: هيكلية الـ JSON تعتمد على الـ API المستخدم
            if (data && data.prices) {
                // استخراج الدولار (USD)
                const usd = data.prices.find(p => p.currency_id === 1);
                if (usd) {
                    usdBuy.innerText = parseInt(usd.buy).toLocaleString();
                    usdSell.innerText = parseInt(usd.sell).toLocaleString();
                    currentUsdSell = parseInt(usd.sell);
                    usdShimmer.style.display = 'none'; // إخفاء مؤشر التحميل
                }

                // استخراج اليورو (EUR)
                const eur = data.prices.find(p => p.currency_id === 2);
                if (eur) {
                    eurBuy.innerText = parseInt(eur.buy).toLocaleString();
                    eurSell.innerText = parseInt(eur.sell).toLocaleString();
                    eurShimmer.style.display = 'none';
                }

                // تحديث الوقت وحالة الاتصال
                const now = new Date();
                updateText.innerText = "آخر تحديث مباشر: " + now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
                statusLight.className = 'online'; // أخضر
            } else {
                throw new Error("بيانات غير مكتملة");
            }

        } catch (error) {
            console.error('خطأ في جلب البيانات:', error);
            statusLight.className = 'error'; // أحمر
            updateText.innerText = "فشل الاتصال المباشر. حاول لاحقاً.";
            // يمكنك هنا وضع أسعار احتياطية Offline
        }
    }

    // جلب الإعلان من جيت هاب
    async function loadAd() {
        try {
            const r = await fetch("https://raw.githubusercontent.com/FirassAldalate/Black-List/refs/heads/main/ad.json");
            const d = await r.json();
            if (d.active) {
                const box = document.getElementById('smart-ad-box');
                box.style.display = "block";
                document.getElementById('smart-ad-img').src = d.image_url;
                box.onclick = () => {
                    navigator.clipboard.writeText(d.link_url);
                    const t = document.getElementById('copy-toast');
                    t.style.display = 'block'; setTimeout(() => t.style.display='none', 2000);
                }
            }
        } catch(e) {}
    }

    // تشغيل الجلب عند التحميل وتكراره كل دقيقة
    window.onload = function() {
        loadAd();
        fetchLivePrices(); // الجلب الأولي
        setInterval(fetchLivePrices, 60000); // تحديث كل 60 ثانية (1 دقيقة)
    };
</script>

</body>
</html>
