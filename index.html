<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القائمة السوداء</title>
    <style>
        :root { --accent: #e74c3c; --bg: #1a1a1a; --success: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.3); margin-bottom: 100px; }
        .main-title { text-align: center; font-size: 26px; font-weight: 900; margin-bottom: 5px; }
        .sub-title { text-align: center; font-size: 11px; color: var(--accent); margin-bottom: 20px; font-weight: bold; }
        
        #status-container { margin-bottom: 20px; text-align: center; }
        #status-text { font-size: 12px; font-weight: bold; color: #888; display: block; margin-bottom: 8px; }
        .progress-bar { width: 100%; height: 6px; background-color: #eee; border-radius: 10px; overflow: hidden; position: relative; display: block; }
        .progress-line { width: 40%; height: 100%; background-color: var(--accent); position: absolute; left: -40%; border-radius: 10px; animation: loading 1.5s infinite linear; }
        @keyframes loading { 0% { left: -40%; } 100% { left: 100%; } }

        .search-area select, .search-area input { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #eee; margin-bottom: 12px; font-size: 15px; font-weight: bold; outline: none; box-sizing: border-box; text-align: center; }
        .search-area button { width: 100%; background: #000; color: white; border: none; padding: 18px; border-radius: 20px; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        .result-card { background: #fff; border-radius: 25px; padding: 20px; margin-top: 25px; border-left: 8px solid #000; box-shadow: 0 10px 25px rgba(0,0,0,0.05); animation: slideUp 0.4s ease; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f8f9fa; flex-direction: row-reverse; }
        .label { font-weight: bold; color: var(--accent); font-size: 13px; min-width: 100px; text-align: left; }
        .value { color: #333; font-weight: 600; direction: ltr; text-align: right; }
        .error-msg { background: #fff5f5; color: var(--accent); padding: 20px; border-radius: 15px; margin-top: 20px; text-align: center; font-weight: bold; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }

        /* --- تنسيقات الإعلان --- */
        #smart-ad-box { position: fixed; bottom: 0; left: 0; width: 100%; min-height: 85px; z-index: 99999; display: none; background: #0f172a; border-top: 2px solid #ffb100; box-shadow: 0 -5px 25px rgba(0,0,0,0.6); overflow: hidden; cursor: pointer; }
        .dhikr-style { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); height: 85px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        @keyframes pulseGlowGold { 0% { color: #ffb100; text-shadow: 0 0 5px rgba(255, 177, 0, 0.4); } 50% { color: #ffd061; text-shadow: 0 0 15px rgba(255, 177, 0, 0.8); } 100% { color: #ffb100; text-shadow: 0 0 5px rgba(255, 177, 0, 0.4); } }
        .dhikr-style h2 { margin: 0; font-size: 1.1rem; font-weight: 800; animation: pulseGlowGold 3s infinite; }
        .dhikr-style p { margin: 2px 0 0 0; font-size: 0.9rem; font-weight: 600; color: #fff; }
        #smart-ad-img { width: 100%; height: 85px; object-fit: fill; display: block; }
        #copy-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; display: none; z-index: 100000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="container">
    <div class="main-title">القائمة السوداء</div>
    <div class="sub-title">BLACK LIST DATABASE</div>
    
    <div id="status-container">
        <span id="status-text">🔄 جاري الاتصال بالسيرفر...</span>
        <div id="loader" class="progress-bar"><div class="progress-line"></div></div>
    </div>

    <div class="search-area">
        <select id="searchType">
            <option value="imei">البحث عن طريق IMEI</option>
            <option value="serial">البحث عن طريق السيريال</option>
            <option value="name">البحث عن طريق الشركة / الموديل</option>
        </select>
        <input type="text" id="q" placeholder="أدخل البيانات المطلوبة...">
        <button onclick="doSearch()">البحث في القائمة</button>
    </div>
    <div id="results"></div>
</div>

<div id="smart-ad-box">
    <div id="smart-ad-content"></div>
</div>
<div id="copy-toast">تم نسخ رقم التواصل بنجاح!</div>

<script>
    // --- كود قاعدة البيانات ---
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSF5W0EW-E_36UGUSpTWJkXx7gaLqjUbyz90syivKGp9D4GFWIm_yQmQxaNo_2lUmN1pM0BjH4bQPnI/pub?gid=0&single=true&output=csv';
    let database = [];

    async function loadData() {
        try {
            const response = await fetch(sheetUrl + "&t=" + new Date().getTime());
            const data = await response.text();
            database = data.split('\n').filter(row => row.trim() !== '').map(row => 
                row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1').trim())
            );
            document.getElementById('loader').style.display = "none";
            document.getElementById('status-text').innerHTML = "🟢 السيرفر جاهز";
            document.getElementById('status-text').style.color = "#27ae60";
        } catch (e) { 
            document.getElementById('status-text').innerHTML = "🔴 خطأ في الاتصال"; 
        }
    }
    loadData();

    function doSearch() {
        const query = document.getElementById('q').value.trim().toLowerCase();
        const searchType = document.getElementById('searchType').value;
        const resDiv = document.getElementById('results');
        if (database.length === 0 || !query) return;
        resDiv.innerHTML = "";
        const labels = ["الشركة", "الموديل", "اللون", "IMEI", "السيريال", "رقم المالك"];
        let found = [];
        for (let i = 1; i < database.length; i++) {
            const row = database[i];
            let isMatch = false;
            if (searchType === 'imei' && row[4] && row[4].toLowerCase() === query) isMatch = true;
            else if (searchType === 'serial' && row[5] && row[5].toLowerCase() === query) isMatch = true;
            else if (searchType === 'name') {
                const info = ((row[1] || "") + " " + (row[2] || "")).toLowerCase();
                if (info.includes(query)) isMatch = true;
            }
            if (isMatch) found.push(row);
        }
        if (found.length > 0) {
            found.forEach(row => {
                const card = document.createElement('div');
                card.className = 'result-card';
                let html = "";
                for(let j=1; j<=6; j++) {
                    let val = row[j] || "---";
                    if (searchType === 'name' && (j === 4 || j === 5)) {
                        if (val !== "---" && val.length > 3) val = val.substring(0, val.length - 3) + "***";
                    }
                    if (searchType === 'name' && j === 6) val = "⚠️ مخفي";
                    html += `<div class="info-row"><span class="label">${labels[j-1]}</span><span class="value">${val}</span></div>`;
                }
                if (row[6] && searchType !== 'name') {
                    html += `<div style="margin-top:15px;"><a href="tel:${row[6]}" style="display:block; background:#000; color:#fff; text-decoration:none; padding:12px; border-radius:15px; text-align:center; font-weight:bold;">📞 اتصال بالمالك</a></div>`;
                }
                card.innerHTML = html;
                resDiv.appendChild(card);
            });
        } else { resDiv.innerHTML = `<div class="error-msg">⚠️ لم يتم العثور على نتائج</div>`; }
    }

    // --- كود الإعلان المدمج ---
    (function() {
        const AD_JSON_URL = "https://raw.githubusercontent.com/FirassAldalate/Black-List/refs/heads/main/ad.json";
        const adBox = document.getElementById('smart-ad-box');
        const adContent = document.getElementById('smart-ad-content');
        const toast = document.getElementById('copy-toast');
        let contactToCopy = "";

        function showDhikr() {
            adBox.style.display = "block";
            adContent.innerHTML = `<div class="dhikr-style"><h2>لا إله إلا الله محمد رسول الله</h2><p>اللهم صلِّ على سيدنا محمد</p></div>`;
            adBox.onclick = null;
        }

        function copyAction(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 2500);
        }

        async function fetchSmartAd() {
            try {
                const res = await fetch(AD_JSON_URL + "?t=" + new Date().getTime());
                const data = await res.json();
                if (data.active) {
                    contactToCopy = data.link_url;
                    adBox.style.display = "block";
                    adContent.innerHTML = `<img id="smart-ad-img" src="${data.image_url}" alt="Ad">`;
                    adBox.onclick = function() { if(contactToCopy) copyAction(contactToCopy); };
                } else { showDhikr(); }
            } catch (e) { showDhikr(); }
        }

        window.addEventListener('load', fetchSmartAd);
        window.addEventListener('offline', showDhikr);
        window.addEventListener('online', fetchSmartAd);
    })();
</script>

</body>
</html>
