<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>السوبر أدمن - الإدارة العليا</title>
    <style>
        /* --- الهوية البصرية الموحدة --- */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-gold: #ffb100;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 177, 0, 0.02) 0%, transparent 70%);
            z-index: -1;
        }

        /* شاشة الدخول الخاصة بالمالك */
        #login-screen { 
            position: fixed; inset: 0; 
            background: var(--bg-color); 
            display: flex; justify-content: center; 
            align-items: center; z-index: 1000; 
        }
        
        .login-box { 
            background: var(--card-bg); 
            padding: 40px 30px; 
            border-radius: 30px; 
            text-align: center; 
            width: 90%; max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .login-box h3 { color: var(--accent-gold); margin-bottom: 25px; font-size: 20px; }
        .login-box input {
            width: 100%; padding: 15px; margin-bottom: 20px;
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.5); color: white;
            text-align: center; font-size: 20px; box-sizing: border-box; outline: none;
        }
        .btn-login {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--accent-gold), #cc8e00);
            color: #0f172a; border-radius: 15px; border: none;
            font-weight: 800; font-size: 18px; cursor: pointer;
        }

        /* محتوى السوبر أدمن */
        .container { max-width: 500px; margin: 0 auto; display: none; padding-bottom: 50px; }
        .admin-header { text-align: center; color: var(--accent-gold); margin: 25px 0; font-weight: 900; }
        
        .search-box { 
            width: 100%; padding: 16px; border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: var(--card-bg); color: #fff; 
            margin-bottom: 25px; box-sizing: border-box; 
            text-align: center; font-weight: bold; font-size: 16px;
            outline: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .search-box:focus { border-color: var(--accent-gold); }

        /* بطاقة التعديل */
        .card { 
            background: var(--card-bg); border-radius: 25px; 
            padding: 20px; margin-bottom: 20px; 
            border-right: 6px solid var(--accent-gold);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card label { display: block; font-size: 11px; color: var(--accent-gold); font-weight: bold; margin-bottom: 5px; padding-right: 5px; }
        .card input { 
            width: 100%; padding: 12px; 
            background: rgba(15, 23, 42, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 12px; color: #fff; 
            margin-bottom: 12px; box-sizing: border-box; 
            font-weight: 600; font-size: 14px; outline: none;
        }
        .card input:focus { border-color: var(--accent-gold); }
        
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: white; transition: 0.2s; }
        .btn-save { background: var(--success); box-shadow: 0 4px 15px rgba(39, 174, 96, 0.2); }
        .btn-del { background: transparent; border: 2px solid var(--danger); color: var(--danger); }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        
        #msg-loading { text-align: center; color: var(--text-dim); padding: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="login-screen">
        <div class="login-box">
            <h3>🔐 الرمز الخاص بالمالك</h3>
            <input type="password" id="pass" placeholder="•••••••">
            <button class="btn-login" onclick="verify()">دخول النظام</button>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <h2 class="admin-header">إدارة البيانات المنشورة</h2>
        
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن IMEI أو موديل للتعديل..." oninput="filterData()">
        
        <div id="dataList">
            <p id="msg-loading">🔄 جاري تحميل السجل العام...</p>
        </div>
    </div>

<script>
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbyS8x7lZ40mEzbgP3tOw56ZxHnCd2XUk2dC7vdbma4J8zVDlkUkrSgivf3HApBowocjSg/exec';
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSF5W0EW-E_36UGUSpTWJkXx7gaLqjUbyz90syivKGp9D4GFWIm_yQmQxaNo_2lUmN1pM0BjH4bQPnI/pub?gid=0&single=true&output=csv';
    
    let allData = [];

    function verify() {
        // ضع كلمة السر الخاصة بك هنا
        if(document.getElementById('pass').value === '123789') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            loadFullData();
        } else {
            alert("⚠️ الرمز غير صحيح!");
        }
    }

    function parseCSV(text) {
        const rows = [];
        const lines = text.split(/\r?\n/);
        for (let line of lines) {
            if (line.trim() === "") continue;
            const parts = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            if (parts) {
                rows.push(parts.map(p => p.replace(/^"|"$/g, '').trim()));
            }
        }
        return rows;
    }

    async function loadFullData() {
        const listDiv = document.getElementById('dataList');
        try {
            const response = await fetch(csvUrl + "&v=" + new Date().getTime());
            const text = await response.text();
            allData = parseCSV(text);
            renderCards(allData);
        } catch (e) {
            listDiv.innerHTML = "<p id='msg-loading'>❌ خطأ في الاتصال بقاعدة البيانات</p>";
        }
    }

    function renderCards(rows) {
        const listDiv = document.getElementById('dataList');
        listDiv.innerHTML = "";
        
        if (rows.length <= 1) {
            listDiv.innerHTML = "<p id='msg-loading'>لا توجد بيانات منشورة حالياً</p>";
            return;
        }

        for (let i = 1; i < rows.length; i++) {
            const r = rows[i];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="info-row"><label>الشركة</label><input type="text" id="br-${i+1}" value="${r[1] || ''}"></div>
                <div class="info-row"><label>الموديل</label><input type="text" id="mo-${i+1}" value="${r[2] || ''}"></div>
                <div class="info-row"><label>اللون</label><input type="text" id="cl-${i+1}" value="${r[3] || ''}"></div>
                <div class="info-row"><label>IMEI</label><input type="text" id="im-${i+1}" value="${r[4] || ''}"></div>
                <div class="info-row"><label>السيريال</label><input type="text" id="sn-${i+1}" value="${r[5] || ''}"></div>
                <div class="info-row"><label>الهاتف</label><input type="text" id="ph-${i+1}" value="${r[6] || ''}"></div>
                <div class="actions">
                    <button class="btn btn-save" onclick="updateRow(${i+1}, this)">حفظ التعديل ✅</button>
                    <button class="btn btn-del" onclick="deleteRow(${i+1}, this)">حذف نهائي 🗑️</button>
                </div>`;
            listDiv.appendChild(card);
        }
    }

    function filterData() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter((r, index) => {
            if (index === 0) return false;
            return r.some(cell => cell.toLowerCase().includes(term));
        });
        // إضافة سطر العناوين للفلترة لكي تعمل renderCards بشكل صحيح
        renderCards([allData[0], ...filtered]);
    }

    async function updateRow(rowNum, btn) {
        const card = btn.closest('.card');
        btn.innerText = "...";
        btn.disabled = true;

        const params = `action=edit_main&row=${rowNum}` +
            `&brand=${encodeURIComponent(document.getElementById('br-'+rowNum).value)}` +
            `&model=${encodeURIComponent(document.getElementById('mo-'+rowNum).value)}` +
            `&color=${encodeURIComponent(document.getElementById('cl-'+rowNum).value)}` +
            `&imei=${encodeURIComponent(document.getElementById('im-'+rowNum).value)}` +
            `&serial=${encodeURIComponent(document.getElementById('sn-'+rowNum).value)}` +
            `&owner=${encodeURIComponent(document.getElementById('ph-'+rowNum).value)}`;

        await fetch(`${scriptUrl}?${params}`, { mode: 'no-cors' });
        alert("✅ تم تعديل البيانات بنجاح");
        btn.innerText = "حفظ التعديل ✅";
        btn.disabled = false;
    }

    async function deleteRow(rowNum, btn) {
        if(!confirm("⚠️ هل أنت متأكد من حذف هذا البلاغ نهائياً من القائمة المنشورة؟")) return;
        
        const card = btn.closest('.card');
        btn.innerText = "...";
        btn.disabled = true;

        await fetch(`${scriptUrl}?action=delete_main&row=${rowNum}`, { mode: 'no-cors' });
        card.style.opacity = "0";
        setTimeout(() => { card.remove(); }, 500);
    }
</script>
</body>
</html>
